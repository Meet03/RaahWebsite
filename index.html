<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RAAH Technologies — your trusted partner for Identity & Access Management. Advisory, professional, managed and staffing services across IAM, IGA, PAM and CIAM."
    />
    <meta name="theme-color" content="#0d0042" />
    <title>RAAH Technologies | Identity & Access Management Experts</title>
    <script>
      // Apply theme before paint to avoid flash of wrong theme
      try {
        var t = localStorage.getItem('theme')
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
